version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: task_db_container
    restart: always
    environment:
      MYSQL_DATABASE: task_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: task_backend_container
    ports:
      - "5000:5000"
    environment:
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_NAME=task_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: task_frontend_container
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
